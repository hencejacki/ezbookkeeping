name: Port Snapshot

on:
  push:
    branches:
      - port/riscv64

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: |
              linux/amd64
              linux/riscv64
      -
        name: Build and package
        uses: docker/build-push-action@v6
        with:
            context: .
            file: ./Dockerfile_Pack
            platforms: |
                linux/amd64
                linux/riscv64
            build-args: |
                BUILD_PIPELINE=1
                SKIP_TESTS=${{ vars.SKIP_TESTS }}
                RELEASE_BUILD=${{ vars.RELEASE_BUILD }}
            push: false
            outputs: type=local,dest=./out
      -
        name: Upload amd64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ezbk-amd64
          include-hidden-files: true
          path: |
            ./out/linux_amd64/go/src/github.com/mayswind/ezbookkeeping/package/
      -
        name: Upload riscv64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ezbk-riscv64
          include-hidden-files: true
          path: |
            ./out/linux_riscv64/go/src/github.com/mayswind/ezbookkeeping/package/
